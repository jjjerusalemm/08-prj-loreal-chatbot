<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Beauty Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <!-- L'Oréal branding -->
        <div class="logo-container">
          <h1 class="site-title">
            L'<span class="loreal-o">O</span>RÉAL Beauty Advisor
          </h1>
          <p class="tagline">Your Personal Beauty Consultation</p>
        </div>

        <!-- User name input -->
        <div class="user-info-section">
          <input
            id="userName"
            type="text"
            placeholder="Share your name for a personalized experience"
            class="user-name-input"
            autocomplete="off"
          />
        </div>
      </header>

      <!------- Main Chat Area ------->
      <main class="main-content">
        <!-- Display latest question ------->
        <section
          id="latestQuestionSection"
          class="latest-question-section"
          style="display: none"
        >
          <div class="latest-question-box">
            <strong>Your Beauty Inquiry</strong>
            <p id="latestQuestion"></p>
          </div>
        </section>

        <!-- Chat messages area ------->
        <section class="chatbox">
          <div id="chatWindow" class="chat-window">
            <!-- Welcome message will appear here -->
          </div>

          <!-- Input form ------->
          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Describe your beauty concerns or ask about our products..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" class="send-btn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>

        <!-- Action buttons ------->
        <div class="action-buttons">
          <button id="resetBtn" class="action-btn reset-btn">
            <span class="material-icons">refresh</span>
            Start Fresh
          </button>
          <button id="clearBtn" class="action-btn clear-btn">
            <span class="material-icons">delete_sweep</span>
            Clear History
          </button>
          <button id="helpBtn" class="action-btn help-btn">
            <span class="material-icons">spa</span>
            Beauty Guide
          </button>
        </div>
      </main>

      <!------- Footer ------->
      <footer class="site-footer">
        <p>L'<span class="loreal-o">O</span>RÉAL Paris</p>
        <nav>
          <a href="#">Privacy & Care</a>
          <a href="#">Terms of Beauty</a>
          <a href="#">Contact Our Experts</a>
        </nav>
      </footer>
    </div>

    <!-- Link to JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
